<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body>

    {% include sidebar.html %}

    <!-- Wrap is the content to shift when toggling the sidebar. We wrap the
         content to avoid any CSS collisions with our real content. -->
    <div class="wrap">
      <div class="masthead">
        <div class="container">
          <h3 class="masthead-title">
            <a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>
            <small>{{ site.description }}</small>
          </h3>
        </div>
      </div>

      <div class="container content">
        <div class="page">
          {{ content }}
        </div>
      </div>
    </div>

    <label for="sidebar-checkbox" class="toggle"></label>
    <script>
      (function(document) {
        var toggle = document.querySelector('.toggle'),
            sidebar = document.querySelector('.sidebar'),
            wrap = document.querySelector('.wrap');

        toggle.addEventListener('click', function(e) {
          e.preventDefault();
          document.getElementById('sidebar-checkbox').checked = !document.getElementById('sidebar-checkbox').checked;
        });

        wrap.addEventListener('click', function(e) {
          if (document.getElementById('sidebar-checkbox').checked && window.innerWidth < 768) {
            document.getElementById('sidebar-checkbox').checked = false;
          }
        });
      })(document);
    </script>
  </body>
</html>
